# CI: gouvernance docs + applicatif (PHPUnit backend, build Vite front).
# PR vers main/develop: lint structure -> validation docs -> tests PHP + build front -> artefact gouvernance.

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance structure
        run: |
          test -d docs/ops/01_context
          test -d docs/ops/02_setup
          test -d docs/ops/03_specs
          test -d docs/ops/04_tasks
          test -d docs/ops/05_agents
          test -d docs/ops/06_reviews

      - name: Validate required GitHub files
        run: |
          test -f .github/CODEOWNERS
          test -f .github/PULL_REQUEST_TEMPLATE.md

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project docs
        run: |
          test -f docs/ops/01_context/PROJECT_CONTEXT.md
          test -f docs/ops/03_specs/FUNCTIONAL_SPEC.md
          test -f docs/ops/03_specs/TECH_SPEC.md
          test -f docs/ops/03_specs/API_CONTRACTS.md
          test -f docs/ops/04_tasks/BACKLOG.md

      - name: Validate orchestration docs
        run: |
          test -f docs/ops/05_agents/ORCHESTRATOR.md
          test -f docs/ops/05_agents/HANDOFF_PROTOCOL.md
          test -f docs/ops/05_agents/PARALLEL_AGENTS_WORKFLOW.md
          test -f docs/ops/04_tasks/TASK_IDS.md
          test -f docs/ops/06_reviews/BLOCKERS.md

  phpunit:
    name: PHPUnit (backend)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit
        run: composer test

  frontend-build:
    name: Vite build (frontend)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run build

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [phpunit, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package docs artifact
        run: |
          tar -czf governance-docs.tar.gz docs/ops .github

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: governance-docs
          path: governance-docs.tar.gz
